
<!DOCTYPE html>

<html>
<head>

<title>Admin Login</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
font-family:Arial;
}

.container{
background:white;
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#4facfe;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2d8cf0;
}

.error{
color:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Admin Login</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Admin Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

{% if error %}

<p class="error">{{ error }}</p>
{% endif %}

</div>


</body>
</html>
