<!DOCTYPE html>

<html>
<head>

<title>Signup</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}





/* Background */

body{
background:white;
min-height:100vh;
}

/* Form Card */

.container{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
}

.card{
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:40px;
width:350px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

.card h2{
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
background:#4facfe;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2d8cf0;
}

</style>

</head>

<body>
    

<div class="container">

<div class="card">

<h2>Create Account</h2>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>
<p style="color:red;">{{ error }}</p>

<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>

</div>

</div>


</body>
</html>
